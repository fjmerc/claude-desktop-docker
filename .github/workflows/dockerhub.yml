name: Build and Push Claude Desktop Docker

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 0.9.2)'
        required: true
        default: '0.9.2'
      platforms:
        description: 'Platforms to build for (comma-separated)'
        required: true
        default: 'linux/amd64,linux/arm64'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
        with:
          platforms: 'arm64,amd64'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        with:
          install: true

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: fjmerc/claude-desktop
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
            echo "PLATFORMS=${{ github.event.inputs.platforms }}" >> $GITHUB_ENV
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
            echo "VERSION=$VERSION" >> $GITHUB_ENV
            echo "PLATFORMS=linux/amd64,linux/arm64" >> $GITHUB_ENV
          else
            echo "VERSION=0.9.2" >> $GITHUB_ENV
            echo "PLATFORMS=linux/amd64,linux/arm64" >> $GITHUB_ENV
          fi

      - name: Build (load amd64 for smoke test)
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./dockerhub/Dockerfile.dockerhub
          platforms: linux/amd64
          load: true
          tags: claude-desktop-smoke:test
          build-args: |
            VERSION=${{ env.VERSION }}
            NODE_VERSION=22.x
          cache-from: type=registry,ref=fjmerc/claude-desktop:buildcache

      - name: Smoke test the built image
        run: |
          # Catches the "Anthropic restructured their installer and the build
          # silently produced a broken image" failure mode before we publish.
          docker run -d --name smoke --privileged --shm-size 2g \
              -p 5901:5901 -p 6080:6080 \
              claude-desktop-smoke:test
          # Wait for VNC + an Electron process to be alive (60s budget)
          for i in $(seq 1 60); do
              if docker exec smoke bash -c 'nc -z localhost 5901 && pgrep -f "electron.*app.asar" >/dev/null' 2>/dev/null; then
                  echo "smoke OK after ${i}s"
                  exit 0
              fi
              sleep 1
          done
          echo "smoke FAILED — VNC up=$(docker exec smoke nc -z localhost 5901 && echo yes || echo no), electron=$(docker exec smoke pgrep -f 'electron.*app.asar' >/dev/null && echo yes || echo no)"
          docker logs smoke | tail -100
          exit 1

      - name: Tear down smoke container
        if: always()
        run: docker rm -f smoke 2>/dev/null || true

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./dockerhub/Dockerfile.dockerhub
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ env.VERSION }}
            NODE_VERSION=22.x
          cache-from: type=registry,ref=fjmerc/claude-desktop:buildcache
          cache-to: type=registry,ref=fjmerc/claude-desktop:buildcache,mode=max

      - name: Update Docker Hub Description
        uses: peter-evans/dockerhub-description@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: fjmerc/claude-desktop
          short-description: "Claude Desktop Docker - Run Claude Desktop in a Docker container"
          readme-filepath: ./dockerhub/DOCKERHUB.md
