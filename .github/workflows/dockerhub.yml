name: Build and Push Claude Desktop Docker

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (defaults to the CLAUDE_VERSION pinned in build-claude.sh)'
        required: false
        default: ''
      platforms:
        description: 'Platforms to build for (comma-separated)'
        required: true
        default: 'linux/amd64,linux/arm64'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
        with:
          platforms: 'arm64,amd64'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        with:
          install: true

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Determine version
        id: version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          INPUT_PLATFORMS: ${{ github.event.inputs.platforms }}
        run: |
          if [[ -n "$INPUT_VERSION" ]]; then
            VERSION="$INPUT_VERSION"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            # Single source of truth so auto-bump PRs never touch workflow files
            VERSION=$(sed -nE 's/^CLAUDE_VERSION="([0-9.]+)"/\1/p' claude-linux-desktop-build/build-claude.sh)
          fi
          if [[ -z "$VERSION" ]]; then
            echo "ERROR: could not determine version" >&2
            exit 1
          fi
          PLATFORMS="${INPUT_PLATFORMS:-linux/amd64,linux/arm64}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "PLATFORMS=$PLATFORMS" >> "$GITHUB_ENV"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "majorminor=${VERSION%.*}" >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: fjmerc/claude-desktop
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=${{ steps.version.outputs.version }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=raw,value=${{ steps.version.outputs.majorminor }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' }}

      - name: Verify pinned version matches upstream
        # The installer URL is unversioned (always latest), so building while
        # upstream has moved would publish a mislabeled image. Fail here; the
        # weekly upstream-version-check workflow opens the bump PR that fixes it.
        run: bash scripts/utils/check-upstream-version.sh "$VERSION"

      - name: Build (load amd64 for smoke test)
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./dockerhub/Dockerfile.dockerhub
          platforms: linux/amd64
          load: true
          tags: claude-desktop-smoke:test
          build-args: |
            VERSION=${{ env.VERSION }}
            NODE_VERSION=22.x
          cache-from: type=registry,ref=fjmerc/claude-desktop:buildcache

      - name: Smoke test the built image
        run: bash scripts/utils/smoke-test-image.sh claude-desktop-smoke:test

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./dockerhub/Dockerfile.dockerhub
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ env.VERSION }}
            NODE_VERSION=22.x
          cache-from: type=registry,ref=fjmerc/claude-desktop:buildcache
          cache-to: type=registry,ref=fjmerc/claude-desktop:buildcache,mode=max

      # NOTE: Docker Hub's repository-management API (the endpoint that
      # updates a repo's short / long description) rejects Personal Access
      # Tokens — it only accepts the actual account password. Auto-updating
      # the description from CI therefore requires storing your real
      # password as a secret, which is a security downgrade we won't do.
      # Update `dockerhub/DOCKERHUB.md` here, then paste it into the
      # "Repository Overview" box at
      #   https://hub.docker.com/repository/docker/fjmerc/claude-desktop/general
      # by hand when you release. (Or re-add a peter-evans/dockerhub-description
      # step with a DOCKERHUB_PASSWORD secret if you change your mind.)
