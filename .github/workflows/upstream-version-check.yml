name: Upstream version check

# Fails loudly when Anthropic publishes a Claude Desktop version newer than
# the CLAUDE_VERSION pinned in claude-linux-desktop-build/build-claude.sh.
# Without this, the published Docker image goes quietly stale: the installer
# URL is unversioned, so builds keep "working" while shipping a version that
# no longer matches the image tag.

on:
  schedule:
    - cron: '17 6 * * 1'   # weekly, Monday 06:17 UTC
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Compare pinned CLAUDE_VERSION with upstream RELEASES
        run: bash scripts/utils/check-upstream-version.sh
